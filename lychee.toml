# CI のリンク切れ検査設定 (#36)。一時的な外部障害・レート制限による誤検知を抑える。
# lychee は実行ディレクトリの lychee.toml を自動で読み込む。

# 失敗したリクエストのリトライ回数と待機秒数。
max_retries = 3
retry_wait_time = 2

# 各リンクのタイムアウト秒数。
timeout = 20

# 許容ステータスコード。2xx は当然 OK とし、レート制限 (429) も flaky 回避のため許容する。
# (外部の GitHub / 本体 web 版が一時的に 429 を返しても CI を落とさない)
accept = ["200..=299", "429"]

# 除外パターン (正規表現)。
# 本体ゲームリポジトリ (keroway/code-tactics) は現状 private のため匿名アクセスは 404 になる。
# LP の「GitHub を見る」リンク自体は公開予定を見込んだ意図的なものなので、CI を恒久的に
# 落とさないようこの URL のみ検査対象から外す。公開されたらこの除外を削除してよい。
# (LP リポジトリ keroway/code-tactics-lp は -lp 接尾のためマッチせず、引き続き検査される)
exclude = ['^https://github\.com/keroway/code-tactics/?$']
