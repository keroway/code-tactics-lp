name: Lighthouse

# PR 段階で Lighthouse を実行し、Performance / Accessibility / Best Practices / SEO の
# 品質スコアを計測・ゲートする。閾値は lighthouserc.json で管理。
# ci.yml とは別ワークフローにして検証ゲートを独立させている。
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # lhci autorun が startServerCommand (astro preview) を起動し、
      # サブパス配信 URL に対して計測 → lighthouserc.json の閾値で assert する。
      - name: Lighthouse CI
        run: npm run lhci

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-report
          path: .lighthouseci
          if-no-files-found: ignore
