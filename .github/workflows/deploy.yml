name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新の 1 本に集約 (進行中のデプロイはキャンセルしない)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build with Astro
        uses: withastro/action@v5
        # base/site は astro.config.mjs で設定済みのため引数指定は不要

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
