name: CI

# PR 段階で型チェック / lint / format / build を検証する。
# 壊れた変更が main にマージされるのを防ぐゲート。
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (astro check)
        run: npm run astro check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Build
        run: npm run build

  # public/og.png・public/apple-touch-icon.png はリポジトリにコミットされているが、
  # 実体は scripts/generate-og.mjs・scripts/generate-icons.mjs の生成物。
  # コミット済み画像と最新スクリプトの出力がズレた状態でデプロイされないよう、
  # CI で再生成して差分が無いことを検証する。
  assets:
    name: Assets drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate OG image
        run: npm run og

      - name: Regenerate icons
        run: npm run icons

      - name: Detect drift in public/
        # コミット済みの生成物と再生成結果に差分があれば失敗させる。
        # 失敗時はローカルで `npm run og && npm run icons` を実行して再コミットする。
        run: git diff --exit-code -- public/

  # ビルド成果物をプレビュー配信し、内部アンカー・外部リンク・アセットの死活を検証する。
  # サブパス (/code-tactics-lp/) 配信を実環境同様に再現するため、ファイル直読みではなく
  # preview サーバー経由で検査する。
  linkcheck:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: nohup npm run preview > preview.log 2>&1 &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4321/code-tactics-lp/ >/dev/null; then
              echo "server is up"; exit 0
            fi
            sleep 1
          done
          echo "preview server did not start in time" >&2
          cat preview.log >&2 || true
          exit 1

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # lychee.toml の設定 (リトライ/タイムアウト/許容コード/除外) を併用する。
          # --include-fragments で内部アンカー (#concept 等) の存在も検証する。
          args: "--no-progress --include-fragments http://localhost:4321/code-tactics-lp/"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true
